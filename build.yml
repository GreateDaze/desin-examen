name: Build desktop packages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build executable
        run: python -m PyInstaller --onefile --windowed --name TaskFlowMVC main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlowMVC-windows-exe
          path: dist/TaskFlowMVC.exe

  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build executable
        run: python -m PyInstaller --onefile --windowed --name TaskFlowMVC main.py

      - name: Create Debian package structure
        run: |
          mkdir -p package/DEBIAN package/opt/taskflow-mvc package/usr/bin package/usr/share/applications
          cp dist/TaskFlowMVC package/opt/taskflow-mvc/TaskFlowMVC
          chmod +x package/opt/taskflow-mvc/TaskFlowMVC
          ln -s /opt/taskflow-mvc/TaskFlowMVC package/usr/bin/taskflow-mvc
          cat > package/DEBIAN/control <<'EOF'
          Package: taskflow-mvc
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Ivan Cortegoso Rodriguez
          Description: TaskFlow MVC desktop task manager built with PySide6.
          EOF
          cat > package/usr/share/applications/taskflow-mvc.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=TaskFlow MVC
          Exec=taskflow-mvc
          Categories=Utility;
          Terminal=false
          EOF
          dpkg-deb --build package taskflow-mvc_1.0.0_amd64.deb

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlowMVC-linux-deb
          path: taskflow-mvc_1.0.0_amd64.deb
